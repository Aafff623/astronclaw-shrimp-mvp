<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="AstronClaw Shrimp MVP banner">
  <!-- ===== Definitions ===== -->
  <defs>
    <!-- Background radial gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%"  stop-color="#1a1240"/>
      <stop offset="60%" stop-color="#0d0825"/>
      <stop offset="100%" stop-color="#050314"/>
    </radialGradient>

    <!-- Purple → blue circuit gradient for the claw -->
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6C3CE1"/>
      <stop offset="50%"  stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6C3CE1"/>
    </linearGradient>

    <!-- Amber active-tip gradient -->
    <radialGradient id="amberTip" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FCD34D"/>
      <stop offset="40%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <!-- Data-stream line gradient (fades on both ends) -->
    <linearGradient id="dataLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#3B82F6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow for amber tip -->
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== Background ===== -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g stroke="#3B82F6" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="300"  y1="0" x2="300"  y2="400"/>
    <line x1="600"  y1="0" x2="600"  y2="400"/>
    <line x1="900"  y1="0" x2="900"  y2="400"/>
  </g>

  <!-- Horizontal data-stream lines -->
  <g>
    <line x1="0" y1="80"  x2="1200" y2="80"  stroke="url(#dataLine)" stroke-width="1"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="url(#dataLine)" stroke-width="0.6"/>
    <line x1="0" y1="260" x2="1200" y2="260" stroke="url(#dataLine)" stroke-width="0.6"/>
    <line x1="0" y1="330" x2="1200" y2="330" stroke="url(#dataLine)" stroke-width="1"/>
  </g>

  <!-- ===== Particle field ===== -->
  <g fill="#3B82F6" opacity="0.55">
    <circle cx="120"  cy="65"  r="1.2"/>
    <circle cx="220"  cy="120" r="1.6"/>
    <circle cx="80"   cy="200" r="1"/>
    <circle cx="180"  cy="280" r="1.4"/>
    <circle cx="260"  cy="340" r="1"/>
    <circle cx="980"  cy="70"  r="1.4"/>
    <circle cx="1050" cy="160" r="1.2"/>
    <circle cx="1120" cy="240" r="1.6"/>
    <circle cx="970"  cy="310" r="1"/>
    <circle cx="1080" cy="350" r="1.4"/>
  </g>
  <g fill="#6C3CE1" opacity="0.5">
    <circle cx="350"  cy="55"  r="1"/>
    <circle cx="850"  cy="60"  r="1.4"/>
    <circle cx="420"  cy="350" r="1.2"/>
    <circle cx="780"  cy="340" r="1"/>
  </g>

  <!-- ===== Center: stylized geometric claw / mech-lobster silhouette ===== -->
  <g transform="translate(600,200)" filter="url(#glow)">

    <!-- Lower claw arm (mirror group, left) -->
    <g stroke="url(#clawGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Outer arc of left pincer -->
      <path d="M -160,30 Q -200,-30 -120,-90 Q -60,-110 -30,-70"/>
      <!-- Inner arc of left pincer (creating the open-claw gap) -->
      <path d="M -135,15 Q -160,-15 -110,-55 Q -75,-65 -55,-45"/>
      <!-- Connection lines (arm segments) -->
      <line x1="-160" y1="30" x2="-90"  y2="80"/>
      <line x1="-90"  y1="80" x2="-30"  y2="60"/>
      <!-- Faceted body -->
      <polygon points="-30,60 -10,30 20,40 10,80 -20,90"/>
    </g>

    <!-- Right pincer (mirror) -->
    <g stroke="url(#clawGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 160,30 Q 200,-30 120,-90 Q 60,-110 30,-70"/>
      <path d="M 135,15 Q 160,-15 110,-55 Q 75,-65 55,-45"/>
      <line x1="160" y1="30" x2="90"  y2="80"/>
      <line x1="90"  y1="80" x2="30"  y2="60"/>
      <polygon points="30,60 10,30 -10,30 -10,40"/>
    </g>

    <!-- Central core / brain node -->
    <circle cx="0" cy="0" r="22" stroke="url(#clawGrad)" stroke-width="2.5" fill="#1a1240"/>
    <circle cx="0" cy="0" r="10" fill="#6C3CE1"/>
    <circle cx="0" cy="0" r="4"  fill="#FCD34D"/>

    <!-- Tail / body trail -->
    <g stroke="url(#clawGrad)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85">
      <path d="M 0,22 Q 0,90 -30,140"/>
      <path d="M 0,22 Q 0,90  30,140"/>
      <path d="M -15,60 L 15,60"/>
      <path d="M -22,100 L 22,100"/>
    </g>

    <!-- Amber active-status tips (on both pincer outer tips) -->
    <circle cx="-30" cy="-70" r="14" fill="url(#amberTip)" filter="url(#strongGlow)"/>
    <circle cx="30"  cy="-70" r="14" fill="url(#amberTip)" filter="url(#strongGlow)"/>
    <circle cx="-30" cy="-70" r="4"  fill="#FCD34D"/>
    <circle cx="30"  cy="-70" r="4"  fill="#FCD34D"/>
  </g>

  <!-- ===== Connecting circuit lines from center to edges (cloud-edge feel) ===== -->
  <g stroke="#3B82F6" stroke-width="1" fill="none" opacity="0.35">
    <path d="M 440,200 L 200,200 L 150,150"/>
    <path d="M 760,200 L 1000,200 L 1050,250"/>
    <path d="M 600,330 L 600,380"/>
  </g>
  <g fill="#3B82F6" opacity="0.6">
    <circle cx="150"  cy="150" r="3"/>
    <circle cx="1050" cy="250" r="3"/>
    <circle cx="600"  cy="380" r="3"/>
  </g>
</svg>
